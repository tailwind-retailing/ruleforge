# Build & publish RuleForge image to GHCR on every push to master.
# Mirrors the workflow shape used in aerotoysio/documentforge.
#
# Auth: uses the auto-provisioned GITHUB_TOKEN — no PAT setup required.
#
# After the first successful run, set the package visibility to "Public" at:
#   https://github.com/users/aerotoysio/packages/container/ruleforge/settings
# (or give your runtime a docker-login if you'd rather keep it private).

name: Build & publish ruleforge image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ruleforge
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Watchtower deploy
        run: |
          # Watchtower processes one scan at a time and returns 429 to
          # concurrent triggers. With multiple repos publishing close together,
          # a 429 just means "try again in a few seconds" — not a real failure.
          for attempt in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/wt.body -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
              https://watchtower.vollandes.com/v1/update)
            echo "attempt $attempt: HTTP $code"
            cat /tmp/wt.body 2>/dev/null || true; echo
            case "$code" in
              200) exit 0 ;;
              429) sleep $((attempt * 10)) ;;
              *)   exit 1 ;;
            esac
          done
          echo "Watchtower trigger: max retries exhausted"
          exit 1
