# RuleForge — full-stack quickstart
#
# Brings up ruleforge + a fresh DocumentForge backing instance with one command.
# Both pull from ghcr.io once the publishing workflows have run; until then
# `docker compose build documentforge` will fail (no public source in this repo) —
# in that case clone the documentforge repo separately and use its compose, or
# drop a local fixtures pack and switch to RULEFORGE_RULE_SOURCE=local.
#
# Quickstart:
#   cp .env.example .env          # then edit .env (set the two API keys)
#   docker compose up -d
#   curl -H "X-AERO-Key: $RULEFORGE_API_KEY" http://localhost:8080/health

services:
  documentforge:
    image: ghcr.io/aerotoysio/documentforge:latest
    container_name: ruleforge-dfdb
    restart: unless-stopped
    environment:
      DFDB_API_KEY: ${RULEFORGE_DF_API_KEY}     # ruleforge will use the same key to call this
      DFDB_NODE_NAME: dfdb-for-ruleforge
    volumes:
      - ruleforge-dfdb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  ruleforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/aerotoysio/ruleforge:latest
    container_name: ruleforge
    restart: unless-stopped
    depends_on:
      documentforge:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Wire ruleforge to the sibling documentforge container by service name.
      # Override RULEFORGE_DF_BASE_URL in .env if you point at an external DF.
      RULEFORGE_RULE_SOURCE: ${RULEFORGE_RULE_SOURCE:-df}
      RULEFORGE_DF_BASE_URL: ${RULEFORGE_DF_BASE_URL:-http://documentforge:5000}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  ruleforge-dfdb-data:
    name: ruleforge-dfdb-data
