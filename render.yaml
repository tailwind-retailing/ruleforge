# Render blueprint for RuleForge — the runtime rules engine.
#
# This config provisions a single Docker-runtime web service co-located with
# DocumentForge (oregon region) so cold-path lookups stay loopback-fast. The
# engine reads rule snapshots from the public DocumentForge instance by
# default; flip RULEFORGE_DF_BASE_URL to a private DF if you stand one up
# alongside.
#
# To deploy:
#   1. Push this repo to GitHub (already done).
#   2. In Render: New + → Blueprint → select tailwind-retailing/ruleforge.
#   3. Render reads this file and creates a Docker web service.
#   4. Before the first request: in the dashboard, populate the two
#      sync: false secrets (RULEFORGE_DF_API_KEY, RULEFORGE_API_KEY).
#   5. Push to main → Render redeploys automatically.
#
# After deploy:
#   curl -H 'X-AERO-Key: <your-secret>' \
#        -H 'content-type: application/json' \
#        -d '{"orig":"LHR","taxCode":"GB1","pax":[{"id":"p1","ageCategory":"ADT"}]}' \
#        https://ruleforge.onrender.com/v1/tax/pnr
#
# Operational notes:
#   - Auto-router enumerates env bindings ONCE at boot. After publishing a
#     new rule (or new endpoint), trigger a manual deploy in the dashboard or
#     wait for the next push to roll the pods.
#   - /health is open; everything else is gated by RULEFORGE_API_KEY.
#
# This blueprint lists EVERY environment variable the engine reads — it
# doubles as documentation. Vars marked "(local mode only)" are inert
# while RULEFORGE_RULE_SOURCE=df and harmless to leave at their defaults.

services:
  - type: web
    name: ruleforge
    runtime: docker
    plan: starter            # 512 MB RAM. Plenty for warm steady-state at ~70µs/req.
    region: oregon           # match DocumentForge to keep cold-paths in-region.
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # ── 1. Rule source ────────────────────────────────────────────────
      # Where the engine reads rule snapshots from.
      #   df    — DocumentForge over HTTP (production / staging path)
      #   local — bundled fixture pack inside the image (smoke-test path)
      - key: RULEFORGE_RULE_SOURCE
        value: df

      # ── 2. DocumentForge connection (when RULE_SOURCE=df) ─────────────
      # Public DocumentForge by default. Point at a private DF if you stand
      # one up as a sidecar — see deployment.html#render co-located DF.
      - key: RULEFORGE_DF_BASE_URL
        value: https://documentforge.onrender.com

      # Bearer token for the DocumentForge HTTP API. Required when source=df.
      # SET THIS IN THE RENDER DASHBOARD before the first request.
      - key: RULEFORGE_DF_API_KEY
        sync: false

      # Which environment doc's ruleBindings the engine enumerates at boot.
      # Bumping this to "prod" requires the matching env to exist in DF
      # with non-empty ruleBindings.
      - key: RULEFORGE_ENV
        value: staging

      # ── 3. Local file source (when RULE_SOURCE=local) ─────────────────
      # Inert when source=df. Override to repoint at a different fixture
      # set baked into the image.
      - key: RULEFORGE_FIXTURES_DIR
        value: /app/fixtures/rules

      - key: RULEFORGE_REFS_DIR
        value: /app/fixtures/refs

      # ── 4. API auth ───────────────────────────────────────────────────
      # Caller-side shared secret. Sent by callers as either:
      #   X-AERO-Key: <secret>
      #   Authorization: Bearer <secret>
      # When unset, every request is allowed (dev mode). /health stays open
      # regardless. SET THIS IN THE DASHBOARD — long random string.
      - key: RULEFORGE_API_KEY
        sync: false

      # ── 5. ASP.NET Core ───────────────────────────────────────────────
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      # Listening port. Set in the Dockerfile (http://+:8080) and surfaced
      # to Render via EXPOSE 8080. Override here only if you need a non-
      # standard port.
      # - key: ASPNETCORE_URLS
      #   value: http://+:8080
